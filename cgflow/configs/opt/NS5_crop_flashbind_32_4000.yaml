# save dir
result_dir: "/media/data/conrad_hku/3DSynthFlow_boltz/result/opt/flashbind/NS5"

# environment
env_dir: ./data/envs/enamine_stock_apr2026
max_atoms: 60 # maximum atom counts
subsampling_ratio: 0.1 # Memory-variance trade-off

# docking / pocket context for generation
protein_path: ./data/examples/flashbind/pdb/NS5.pdb
center: null # can be inferred from ref_ligand_path if needed
ref_ligand_path: ./data/examples/flashbind/NS5_ligand.mol2
size: [16, 16, 16]

# opt
num_steps: 4000
num_sampling_per_step: 32
temperature: [1, 64] # uniform(1, 64)
seed: 481

# pose prediction
pose_model: "./weights/cgflow_crossdock.ckpt"
pose_steps: 40

# extras
sampling_tau: 0.9 # EMA
random_action_prob: 0.05 # suggest to set positive value
replay_warmup_step: 10 # 10 steps
replay_capacity: 6400

# FlashBind scoring configuration
flashbind:
  # Assume FlashBind is vendored into cgflow at this path.
  root: ./src/FlashBind

  # Protein ID used for sample keys: {prot_id}_{ligand_id}
  # IMPORTANT:
  # - protein_id must match the protein filename stem exactly (e.g. NS5.pdb -> protein_id: NS5).
  # - protein filename and prots_json filename must not contain spaces, special symbols, or underscores (_).
  protein_id: NS5

  # Structural / representation inputs used by FlashBind predict.py
  pdb_dir: ./data/examples/flashbind/pdb
  prots_json: ./data/examples/flashbind/prot.json
  # Fallback paths only. When auto_generate_*_repr is true, runtime uses
  # run-local files under {log_dir}/flashbind_oracle/repr/ instead.
  protein_repr: ./data/examples/flashbind/repr/esm3.lmdb
  ligand_repr: ./data/examples/flashbind/repr/torchdrug.lmdb

  # FABind+ docking checkpoint
  fabind_checkpoint: ./src/FlashBind/FABind_plus/ckpt/fabind_plus_best_ckpt.bin

  # FlashBind checkpoints
  binary_checkpoints:
    - ./src/FlashBind/checkpoints/binary_1.ckpt
    - ./src/FlashBind/checkpoints/binary_2.ckpt
  value_checkpoints:
    - ./src/FlashBind/checkpoints/value_1.ckpt
    - ./src/FlashBind/checkpoints/value_2.ckpt

  # Runtime environments
  fabind_conda_env: fabind
  flashbind_conda_env: flashaffinity

  # FABind+ runtime settings
  fabind_num_threads: 8
  fabind_batch_size: 4
  fabind_post_optim: true

  # FlashBind runtime settings
  devices: 1
  accelerator: gpu
  num_workers: 16
  distance_threshold: 20.0
  repr_n_jobs: -1
  # Hugging Face cache root (hub/, datasets/, transformers/ under this path). Large disk.
  hf_cache: /media/data/conrad_hku/hf_cache
  auto_generate_protein_repr: true
  auto_generate_ligand_repr: true

  # Optional override; defaults to {log_dir}/flashbind_reward_cache.db if null
  reward_cache_path: null
