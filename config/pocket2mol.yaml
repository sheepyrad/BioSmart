db_url: postgresql://user:pass@localhost:5432/drug_pipeline
outputs_root: outputs
target_unique: 1000

generator:
  name: pocket2mol
  n_samples: 200
  common:
    pdbfile: input/NS5_renum.pdb
  pocket2mol:
    center: [114.817, 75.602, 82.416]
    bbox_size: 23.0
    out_dir: outputs/p2m_NS5

thresholds:
  score_threshold: 0.9
  medchem_rule_threshold: 12
  medchem_structural_threshold: 25

timeouts:
  retrosynthesis_sec: 300

retrosynthesis:
  top_n: 5

medchem:
  batch_size: 256
  batch_timeout_sec: 500

boltz:
  pocket_residues: [683,734,805,820,851,852]

unidock:
  search_mode: balance
  batch_size: 200
  center: [114.817, 75.602, 82.416]
  box_size: [25, 25, 25]

concurrency:
  generator_workers: 1
  retrosyn_workers: 1
  medchem_workers: 1
  boltz_workers: 1
  docking_workers: 1

leaderboard:
  top_n: 50


